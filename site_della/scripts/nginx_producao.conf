# ─── D'ELLA Instore — Nginx PRODUÇÃO ─────────────────────────────────────────
#
# Domínio principal: www.dellainstore.com
# Redirecionamentos: dellainstore.com, www.dellainstore.com.br, dellainstore.com.br
#
# COMO APLICAR (após DNS propagar para 159.203.101.232):
#
#   1. Gerar certificados SSL:
#      sudo certbot --nginx \
#        -d www.dellainstore.com \
#        -d dellainstore.com \
#        -d www.dellainstore.com.br \
#        -d dellainstore.com.br
#
#   2. Copiar esta config:
#      sudo cp scripts/nginx_producao.conf /etc/nginx/sites-available/della_site
#
#   3. Testar e recarregar Nginx:
#      sudo nginx -t && sudo systemctl reload nginx
#
#   4. Atualizar .env:
#      SITE_URL=https://www.dellainstore.com
#      BLING_REDIRECT_URI=https://www.dellainstore.com/bling/callback/
#
#   5. Restartar Gunicorn:
#      sudo systemctl restart gunicorn_della_site
#
# ─────────────────────────────────────────────────────────────────────────────

upstream della_site_app {
    server unix:/run/gunicorn_della_site/gunicorn.sock fail_timeout=0;
}

# ── HTTP → HTTPS (todos os domínios) ─────────────────────────────────────────
server {
    listen 80;
    server_name
        www.dellainstore.com
        dellainstore.com
        www.dellainstore.com.br
        dellainstore.com.br
        novo.dellainstore.com.br;

    return 301 https://www.dellainstore.com$request_uri;
}

# ── HTTPS aliases → www.dellainstore.com (301) ────────────────────────────────
server {
    listen 443 ssl;
    server_name
        dellainstore.com
        www.dellainstore.com.br
        dellainstore.com.br
        novo.dellainstore.com.br;

    # SSL — certbot preenche automaticamente ao rodar o comando acima
    ssl_certificate     /etc/letsencrypt/live/www.dellainstore.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.dellainstore.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.dellainstore.com$request_uri;
}

# ── www.dellainstore.com — site principal ─────────────────────────────────────
server {
    listen 443 ssl;
    server_name www.dellainstore.com;

    # SSL — certbot preenche automaticamente ao rodar o comando acima
    ssl_certificate     /etc/letsencrypt/live/www.dellainstore.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.dellainstore.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ─── Segurança HTTP Headers ───────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"                            always;
    add_header X-Content-Type-Options    "nosniff"                         always;
    add_header X-XSS-Protection          "1; mode=block"                   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ─── Arquivos estáticos ───────────────────────────────────────────────────
    location /static/ {
        alias /var/www/della-sistemas/projetos-claude/site_della/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Arquivos de mídia (uploads de produtos) ──────────────────────────────
    location /media/ {
        alias /var/www/della-sistemas/projetos-claude/site_della/media/;
        expires 7d;
        add_header Cache-Control "public";

        location ~* \.(php|py|pl|sh|cgi|asp|aspx)$ {
            deny all;
        }
    }

    # ─── Bloqueia acesso a arquivos sensíveis ─────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(env|git|sql|bak|log|conf)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ─── Import de fotos ZIP (limite maior) ───────────────────────────────────
    location /admin/produtos/produto/import-zip/ {
        proxy_pass         http://della_site_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect       off;
        proxy_read_timeout   300s;
        proxy_connect_timeout 10s;
        client_max_body_size 500M;
    }

    # ─── Proxy para o Gunicorn ────────────────────────────────────────────────
    location / {
        proxy_pass         http://della_site_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_redirect        off;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;

        client_max_body_size 50M;
    }

    access_log /var/log/nginx/della_site_access.log;
    error_log  /var/log/nginx/della_site_error.log warn;
}
