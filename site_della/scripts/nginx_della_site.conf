# ─── Della Instore — Nginx config ────────────────────────────────────────────
#
# FASE DE TESTES:  subdomínio novo.dellainstore.com.br
#   Copiar: sudo cp scripts/nginx_della_site.conf /etc/nginx/sites-available/della_site
#   Ativar:  sudo ln -s /etc/nginx/sites-available/della_site /etc/nginx/sites-enabled/
#   SSL:     sudo certbot --nginx -d novo.dellainstore.com.br
#
# QUANDO APROVAR (troca de domínio):
#   1. Substituir server_name por: www.dellainstore.com.br dellainstore.com.br
#   2. Rodar: sudo certbot --nginx -d www.dellainstore.com.br -d dellainstore.com.br
#   3. Atualizar ALLOWED_HOSTS no .env
#   4. sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

upstream della_site_app {
    server unix:/run/gunicorn_della_site.sock fail_timeout=0;
}

# ── FASE DE TESTES: novo.dellainstore.com.br ──────────────────────────────────
server {
    listen 80;
    server_name novo.dellainstore.com.br;
    return 301 https://novo.dellainstore.com.br$request_uri;
}

server {
    listen 443 ssl;
    server_name novo.dellainstore.com.br;

    # SSL — gerado pelo Certbot na fase de testes
    ssl_certificate     /etc/letsencrypt/live/novo.dellainstore.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/novo.dellainstore.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ─── Segurança HTTP Headers ───────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"                            always;
    add_header X-Content-Type-Options    "nosniff"                         always;
    add_header X-XSS-Protection          "1; mode=block"                   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ─── Arquivos estáticos ───────────────────────────────────────────────────
    location /static/ {
        alias /var/www/della-sistemas/projetos-claude/site_della/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Arquivos de mídia (uploads de produtos) ──────────────────────────────
    location /media/ {
        alias /var/www/della-sistemas/projetos-claude/site_della/media/;
        expires 7d;
        add_header Cache-Control "public";

        # Bloqueia execução de scripts em uploads — segurança crítica
        location ~* \.(php|py|pl|sh|cgi|asp|aspx)$ {
            deny all;
        }
    }

    # ─── Bloqueia acesso a arquivos sensíveis ─────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(env|git|sql|bak|log|conf)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ─── Proxy para o Gunicorn ────────────────────────────────────────────────
    location / {
        proxy_pass         http://della_site_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_redirect       off;
        proxy_read_timeout   60s;
        proxy_connect_timeout 10s;

        client_max_body_size 10M;
    }

    access_log /var/log/nginx/della_site_access.log;
    error_log  /var/log/nginx/della_site_error.log warn;
}


