<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#c9a96e">
  <title>Entrar | D'ELLA Sistemas</title>
  <link rel="manifest" href="{{ STATIC_URL }}manifest.json">
  <link rel="icon" href="{{ STATIC_URL }}icons/icon-192.png">
  <link rel="stylesheet" href="{{ STATIC_URL }}css/della_sistemas.css">
  <style>
    body {
      background: var(--cinza-claro);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .login-card {
      background: var(--branco);
      border: 1px solid var(--cinza-medio);
      border-radius: 14px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .login-logo-img {
      width: 130px;
      height: auto;
      display: block;
      margin: 0 auto 0.5rem;
    }

    .login-logo-instore {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--preto);
      display: block;
    }

    .login-sistemas-internos {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--cinza-texto);
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .login-titulo {
      font-family: 'Jost', sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--cinza-texto);
      text-align: center;
      margin-bottom: 1.75rem;
      padding-top: 1rem;
      border-top: 1px solid var(--cinza-medio);
    }

    .login-form { display: flex; flex-direction: column; gap: 1rem; }

    .login-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--cinza-texto);
      display: block;
      margin-bottom: 0.4rem;
    }

    .login-input {
      width: 100%;
      background: var(--cinza-claro);
      border: 1px solid var(--cinza-medio);
      border-radius: 6px;
      padding: 0.7rem 0.9rem;
      color: var(--preto);
      font-family: 'Jost', sans-serif;
      font-size: 0.9rem;
      transition: border-color 0.25s;
    }

    .login-input:focus {
      outline: none;
      border-color: var(--dourado);
      box-shadow: 0 0 0 3px rgba(201,169,110,0.15);
      background: var(--branco);
    }

    .login-input::placeholder { color: #bbb; }

    /* Wrapper do campo senha com olhinho */
    .login-senha-wrapper {
      position: relative;
    }
    .login-senha-wrapper .login-input {
      padding-right: 2.8rem;
    }
    .login-senha-toggle {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      color: var(--cinza-texto);
      font-size: 1rem;
      line-height: 1;
      display: flex;
      align-items: center;
    }
    .login-senha-toggle:hover { color: var(--preto); }

    .login-btn {
      width: 100%;
      background: var(--dourado);
      color: var(--branco);
      border: none;
      border-radius: 6px;
      padding: 0.8rem;
      font-family: 'Jost', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.25s;
    }

    .login-btn:hover { background: #b8924a; }

    .login-erro {
      background: rgba(217,79,79,0.08);
      border: 1px solid rgba(217,79,79,0.25);
      color: #9b2c2c;
      border-radius: 6px;
      padding: 0.7rem 0.9rem;
      font-size: 0.8rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <img src="{{ STATIC_URL }}icons/logo-della.webp" alt="D'ELLA" class="login-logo-img">
      <span class="login-logo-instore">Instore</span>
    </div>
    <p class="login-sistemas-internos">Sistemas Internos</p>

    <p class="login-titulo">Acesso Restrito</p>

    {% if messages %}
      {% for msg in messages %}
      <div class="login-erro" style="margin-bottom:1rem;">{{ msg }}</div>
      {% endfor %}
    {% endif %}

    <form method="post" class="login-form">
      {% csrf_token %}
      {% if request.GET.next %}
      <input type="hidden" name="next" value="{{ request.GET.next }}">
      {% endif %}

      <div>
        <label class="login-label" for="id_username">Usuário</label>
        <input class="login-input" id="id_username" name="username"
               type="text" autocomplete="username" autofocus required>
      </div>

      <div>
        <label class="login-label" for="id_password">Senha</label>
        <div class="login-senha-wrapper">
          <input class="login-input" id="id_password" name="password"
                 type="password" autocomplete="current-password" required>
          <button type="button" class="login-senha-toggle" id="btn-toggle-senha"
                  aria-label="Mostrar/ocultar senha">
            <span id="icone-senha">&#128065;</span>
          </button>
        </div>
      </div>

      <button type="submit" class="login-btn">Entrar</button>
    </form>
  </div>

  <script>
    const btnToggle = document.getElementById('btn-toggle-senha');
    const inputSenha = document.getElementById('id_password');
    const icone = document.getElementById('icone-senha');

    btnToggle.addEventListener('click', () => {
      if (inputSenha.type === 'password') {
        inputSenha.type = 'text';
        icone.textContent = '🙈';
      } else {
        inputSenha.type = 'password';
        icone.textContent = '👁';
      }
    });
  </script>
</body>
</html>
