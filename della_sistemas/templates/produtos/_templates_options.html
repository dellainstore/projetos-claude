{% for tpl in templates %}
<div onclick="onTemplateSelecionado('{{ tpl.id }}', '{{ tpl.label|escapejs }}')">
  <span style="color:var(--cinza-texto);font-size:0.78rem;">{{ tpl.sku }}</span>
  &nbsp;—&nbsp;
  <strong>{{ tpl.base_name|default:"—" }}</strong>
  {% if tpl.color %}
  <span style="color:var(--dourado);">({{ tpl.color }})</span>
  {% endif %}
</div>
{% empty %}
<div style="color:var(--cinza-texto);font-size:0.8rem;padding:0.75rem;">Nenhum template encontrado</div>
{% endfor %}
